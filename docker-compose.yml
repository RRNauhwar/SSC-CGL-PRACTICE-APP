# Local development infrastructure for the SSC Prep Platform.
# Mirrors the managed services used in production (doc 12 — Technical Architecture):
#   Postgres+pgvector (OLTP + vectors), Redis (cache/queues/realtime),
#   OpenSearch (search), ClickHouse (analytics/OLAP), MinIO (S3-compatible storage).
#
# Usage:
#   pnpm infra:up      # start all services in the background
#   pnpm infra:down    # stop and remove containers
#
# All credentials here are LOCAL-ONLY defaults. Production values come from a
# secrets manager and are never committed (see doc 15 — Security Architecture).

name: ssc-prep

services:
  postgres:
    # pgvector image ships Postgres 16 with the vector extension preinstalled.
    image: pgvector/pgvector:pg16
    container_name: ssc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssc_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-ssc_prep}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ssc} -d ${POSTGRES_DB:-ssc_prep}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssc-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: ssc-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m'
      # Local-only: disable the security plugin so developers can connect without TLS.
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '${OPENSEARCH_PORT:-9200}:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ssc-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ssc}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ssc_local_password}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ssc_analytics}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - '${CLICKHOUSE_HTTP_PORT:-8123}:8123'
      - '${CLICKHOUSE_NATIVE_PORT:-9000}:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: ssc-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ssc}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ssc_local_password}
    ports:
      - '${MINIO_API_PORT:-9002}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  clickhouse-data:
  minio-data:
